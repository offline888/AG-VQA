dataset: VideoFeedback2_All
data_root: /path/to/your/VideoFeedback2
phase: train
name: VideoFeedback2_All_train

type: VideoFeedback2Dataset
dataroot: /path/to/your/VideoFeedback2
meta_info_file: /path/to/your/VideoFeedback2/data_27k_train_SFT.json
